<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Busan Taxi Fare PWA v2-clean: explanatory notes removed -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Busan Premium Taxi Fare Estimator</title>
  <meta name="theme-color" content="#090B10" />
  <meta name="description" content="Estimate Busan premium and large taxi fares using distance, travel time, and toll fee." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Busan Taxi Fare" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    :root {
      --bg: #070910;
      --card: rgba(18, 23, 37, 0.82);
      --card2: rgba(255, 255, 255, 0.07);
      --line: rgba(255, 255, 255, 0.13);
      --text: #f6f7fb;
      --muted: #9ca7bc;
      --gold: #f5c76b;
      --gold2: #ffe3a0;
      --danger: #ff6b6b;
      --ok: #67e8b7;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.48);
      --radius: 26px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 0%, rgba(245, 199, 107, 0.22), transparent 34%),
        radial-gradient(circle at 90% 8%, rgba(80, 120, 255, 0.24), transparent 30%),
        linear-gradient(145deg, #05060a 0%, #0b1020 55%, #05060a 100%);
      padding: 22px;
    }

    .wrap {
      width: min(520px, 100%);
      margin: 0 auto;
      padding-bottom: 40px;
    }

    .hero {
      padding: 18px 2px 18px;
    }

    .badge {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      border: 1px solid rgba(245, 199, 107, 0.28);
      border-radius: 999px;
      color: var(--gold2);
      background: rgba(245, 199, 107, 0.08);
      font-size: 13px;
      letter-spacing: -0.2px;
    }

    h1 {
      margin: 18px 0 8px;
      font-size: 34px;
      line-height: 1.12;
      letter-spacing: -1.3px;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,0.095), rgba(255,255,255,0.045));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(245,199,107,.18), transparent 38%, rgba(255,255,255,.06));
    }

    .inner { position: relative; padding: 22px; }

    .meter-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .meter-title {
      font-size: 14px;
      color: var(--gold2);
      letter-spacing: .2px;
      font-weight: 700;
    }

    .tariff {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
      line-height: 1.4;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    label {
      display: block;
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .field {
      display: flex;
      align-items: center;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 18px;
      background: rgba(0,0,0,.24);
      overflow: hidden;
    }

    input {
      width: 100%;
      min-width: 0;
      color: var(--text);
      background: transparent;
      border: 0;
      outline: 0;
      padding: 17px 16px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.4px;
    }

    input::placeholder { color: rgba(255,255,255,.25); }

    .unit {
      padding-right: 16px;
      color: var(--gold2);
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 430px) {
      body { padding: 16px; }
      h1 { font-size: 30px; }
      .row2 { grid-template-columns: 1fr; }
      input { font-size: 22px; }
    }

    .btn {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 20px;
      padding: 18px 18px;
      color: #191202;
      font-size: 18px;
      font-weight: 900;
      background: linear-gradient(135deg, #f1b94c, #ffe4a5 52%, #e5a936);
      box-shadow: 0 14px 34px rgba(245, 199, 107, 0.24);
      cursor: pointer;
    }

    .btn:active { transform: translateY(1px); }

    .result {
      display: none;
      margin-top: 18px;
      padding: 20px;
      border: 1px solid rgba(245,199,107,.27);
      border-radius: 22px;
      background: rgba(245, 199, 107, .08);
    }

    .result.show { display: block; }

    .result-label {
      color: var(--gold2);
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .price {
      font-size: clamp(42px, 12vw, 64px);
      font-weight: 950;
      line-height: 1;
      letter-spacing: -2.5px;
      text-shadow: 0 0 28px rgba(245, 199, 107, .18);
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .error {
      display: none;
      margin-top: 12px;
      color: #ffd1d1;
      background: rgba(255, 107, 107, .13);
      border: 1px solid rgba(255, 107, 107, .22);
      border-radius: 14px;
      padding: 12px 13px;
      font-size: 13px;
      line-height: 1.45;
    }

    .error.show { display: block; }

    .history {
      margin-top: 18px;
    }

    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0 2px 10px;
    }

    .history h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: -0.3px;
    }

    .smallbtn {
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(255,255,255,.06);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px 15px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.055);
    }

    .item-main {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .item-title {
      font-weight: 850;
      letter-spacing: -0.2px;
    }

    .item-sub {
      color: var(--muted);
      font-size: 12px;
    }

    .item-price {
      color: var(--gold2);
      font-size: 18px;
      font-weight: 950;
      white-space: nowrap;
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
      padding: 12px 4px;
    }

    .footer {
      margin: 18px 4px 0;
      color: rgba(255,255,255,.42);
      font-size: 11px;
      line-height: 1.55;
    }
  
    .install-row {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .installbtn {
      display: none;
      border: 1px solid rgba(245, 199, 107, 0.48);
      background: rgba(245, 199, 107, 0.10);
      color: var(--gold2);
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .installbtn.show {
      display: inline-flex;
    }

  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="badge">🚕 Busan Premium Taxi</div>
      <h1>Busan Premium Taxi<br/>Fare Estimator</h1>
      <p class="sub">Enter the distance, travel time, and any tolls from your map app to estimate a Busan premium/large taxi fare.</p>
    </section>

    <section class="card">
      <div class="inner">
        <div class="meter-top">
          <div class="meter-title">PREMIUM FARE CHECK</div>
          <div class="tariff">Base 3 km ₩7,500<br/>₩200 per 140 m</div>
        </div>

        <div class="grid">
          <div>
            <label for="distance">Distance</label>
            <div class="field">
              <input id="distance" inputmode="decimal" placeholder="e.g. 12.4" autocomplete="off" />
              <div class="unit">km</div>
            </div>
          </div>

          <div class="row2">
            <div>
              <label for="minutes">Travel Time</label>
              <div class="field">
                <input id="minutes" inputmode="decimal" placeholder="e.g. 32" autocomplete="off" />
                <div class="unit">min</div>
              </div>
            </div>

            <div>
              <label for="toll">Toll Fee</label>
              <div class="field">
                <input id="toll" inputmode="numeric" placeholder="0" autocomplete="off" />
                <div class="unit">KRW</div>
              </div>
            </div>
          </div>
        </div>

        <button class="btn" onclick="calculateFare()">Estimate Fare</button>
        <div class="install-row">
          <button id="installBtn" class="installbtn">Install App</button>
        </div>
        <div id="error" class="error"></div>

        <div id="result" class="result">
          <div class="result-label">Estimated Fare</div>
          <div id="price" class="price">₩0</div>
          <div id="resultHint" class="hint"></div>
        </div>
      </div>
    </section>

    <section class="history">
      <div class="history-head">
        <h2>Recent Estimates</h2>
        <button class="smallbtn" onclick="clearHistory()">Clear</button>
      </div>
      <div id="historyList" class="list"></div>
    </section>

  </main>

  <script>
    const STORAGE_KEY = "busanPremiumTaxiHistory.v1";

    function toNumber(value) {
      if (typeof value !== "string") return 0;
      const cleaned = value.replace(/,/g, "").trim();
      if (cleaned === "") return 0;
      const n = Number(cleaned);
      return Number.isFinite(n) ? n : NaN;
    }

    function money(n) {
      return "₩" + Math.round(n).toLocaleString("en-US");
    }

    function roundUpToUnit(value, unit) {
      return Math.ceil(value / unit) * unit;
    }

    function calculateBaseFare(distanceKm) {
      const baseFare = 7500;
      const baseKm = 3;
      const distanceUnitMeter = 140;
      const distanceUnitFare = 200;

      if (distanceKm <= baseKm) return baseFare;
      const extraMeters = (distanceKm - baseKm) * 1000;
      const units = Math.ceil(extraMeters / distanceUnitMeter);
      return baseFare + units * distanceUnitFare;
    }

    function calculateTimeAdjustment(distanceKm, minutes) {
      // Simple time adjustment: when average speed is 15 km/h or slower,
      // add a low-speed time charge for the time exceeding the 15 km/h baseline.
      // Busan premium/large taxi rate: ₩200 per 33 seconds.
      if (distanceKm <= 0 || minutes <= 0) return 0;
      const hours = minutes / 60;
      const avgSpeed = distanceKm / hours;
      if (avgSpeed > 15) return 0;

      const standardMinutesAt15Kmh = (distanceKm / 15) * 60;
      const slowMinutes = Math.max(0, minutes - standardMinutesAt15Kmh);
      const slowSeconds = slowMinutes * 60;
      return Math.ceil(slowSeconds / 33) * 200;
    }

    function calculateFare() {
      const distance = toNumber(document.getElementById("distance").value);
      const minutes = toNumber(document.getElementById("minutes").value);
      const toll = toNumber(document.getElementById("toll").value);
      const error = document.getElementById("error");
      const result = document.getElementById("result");

      error.classList.remove("show");

      if (!Number.isFinite(distance) || distance <= 0) {
        showError("Please enter the distance in kilometers. Example: 12.4");
        return;
      }
      if (!Number.isFinite(minutes) || minutes <= 0) {
        showError("Please enter the travel time in minutes. Example: 32");
        return;
      }
      if (!Number.isFinite(toll) || toll < 0) {
        showError("Please enter a toll fee of 0 KRW or more. If there is no toll, leave it as 0.");
        return;
      }

      const distanceFare = calculateBaseFare(distance);
      const timeAdj = calculateTimeAdjustment(distance, minutes);
      const total = roundUpToUnit(distanceFare + timeAdj + toll, 100);
      const avgSpeed = distance / (minutes / 60);

      document.getElementById("price").textContent = money(total);
      document.getElementById("resultHint").textContent =
        `${distance.toFixed(1)} km · ${minutes.toFixed(0)} min · Avg ${avgSpeed.toFixed(1)} km/h` +
        (toll > 0 ? ` · Toll ${money(toll)} included` : "");

      result.classList.add("show");
      saveHistory({ distance, minutes, toll, total, avgSpeed, createdAt: new Date().toISOString() });
  
    let deferredInstallPrompt = null;
    const installBtn = document.getElementById("installBtn");

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      if (installBtn) installBtn.classList.add("show");
    });

    if (installBtn) {
      installBtn.addEventListener("click", async () => {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        installBtn.classList.remove("show");
      });
    }

    window.addEventListener("appinstalled", () => {
      deferredInstallPrompt = null;
      if (installBtn) installBtn.classList.remove("show");
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }

    renderHistory();
    }

    function showError(message) {
      const error = document.getElementById("error");
      error.textContent = message;
      error.classList.add("show");
      document.getElementById("result").classList.remove("show");
    }

    function getHistory() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function saveHistory(item) {
      const history = getHistory();
      history.unshift(item);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(0, 10)));
    }

    function clearHistory() {
      localStorage.removeItem(STORAGE_KEY);
  
    let deferredInstallPrompt = null;
    const installBtn = document.getElementById("installBtn");

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      if (installBtn) installBtn.classList.add("show");
    });

    if (installBtn) {
      installBtn.addEventListener("click", async () => {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        installBtn.classList.remove("show");
      });
    }

    window.addEventListener("appinstalled", () => {
      deferredInstallPrompt = null;
      if (installBtn) installBtn.classList.remove("show");
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }

    renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById("historyList");
      const history = getHistory();
      if (history.length === 0) {
        list.innerHTML = `<div class="empty">No estimates yet.</div>`;
        return;
      }
      list.innerHTML = history.map(item => {
        const d = new Date(item.createdAt);
        const time = Number.isNaN(d.getTime()) ? "" : d.toLocaleString("en-US", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
        const tollText = item.toll > 0 ? ` · Toll ${money(item.toll)}` : "";
        return `
          <div class="item">
            <div class="item-main">
              <div class="item-title">${item.distance.toFixed(1)} km · ${Math.round(item.minutes)} min</div>
              <div class="item-sub">${time}${tollText}</div>
            </div>
            <div class="item-price">${money(item.total)}</div>
          </div>
        `;
      }).join("");
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") calculateFare();
    });


    let deferredInstallPrompt = null;
    const installBtn = document.getElementById("installBtn");

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      if (installBtn) installBtn.classList.add("show");
    });

    if (installBtn) {
      installBtn.addEventListener("click", async () => {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        installBtn.classList.remove("show");
      });
    }

    window.addEventListener("appinstalled", () => {
      deferredInstallPrompt = null;
      if (installBtn) installBtn.classList.remove("show");
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }

    renderHistory();
  </script>
</body>
</html>
